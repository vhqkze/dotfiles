gui:
  scrollHeight: 2
  language: "zh-CN"
  timeFormat: 2006-01-02 15:04:05
  shortTimeFormat: 15:04
  nerdFontsVersion: "3"
  sidePanelWidth: 0.2
  showBranchCommitHash: true
  splitDiff: "auto"

git:
  pagers:
    - pager: delta --side-by-side --paging=never
    - pager: delta --paging=never
  log:
    showWholeGraph: false
  branchLogCmd: git log --graph --color=always --pretty=format:'%C(yellow)%h%Creset %C(auto)%d%Creset %C(magenta)<%an>%Creset %C(cyan)%G?%Creset %C(blue)%ad%Creset %s' {{branchName}} --date=relative --
  allBranchesLogCmds:
    - git log --graph --branches --remotes --color=always --pretty=format:'%C(yellow)%h%Creset %C(auto)%d%Creset %C(magenta)<%an>%Creset %C(cyan)%G?%Creset %C(blue)%ad%Creset %s' --date=relative --
    - git log --color=always --branches --remotes --full-history --decorate --format=full --name-status --show-signature

notARepository: "skip"

keybinding:
  universal:
    nextBlock-alt2: <disabled>
    prevBlock-alt2: <disabled>
    nextTab: <tab>
    prevTab: <backtab>
